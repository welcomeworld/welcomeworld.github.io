<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
    
    <style>
      /* 移除 wrapper 的最大宽度限制，让它填满全屏 */
      .wrapper {
        max-width: none !important;
        width: 95%;
        margin: 0 auto;
        padding: 20px;
      }
      
      .content-wrapper {
        display: flex;
        gap: 30px;
        margin-top: 20px;
      }
      
      /* 侧边导航栏 - 固定宽度 */
      .sidebar-nav {
        width: 260px;
        flex-shrink: 0;
        background: #f8f8f8;
        padding: 20px;
        border-radius: 8px;
        position: sticky;
        top: 20px;
        height: fit-content;
      }
      
      .sidebar-nav h3 {
        margin-top: 0;
        font-size: 1.2em;
        border-bottom: 2px solid #e1e4e8;
        padding-bottom: 8px;
      }
      
      .sidebar-nav ul {
        list-style: none;
        padding-left: 0;
      }
      
      .sidebar-nav li {
        margin: 12px 0;
      }
      
      .sidebar-nav a {
        text-decoration: none;
        color: #0366d6;
        font-size: 14px;
      }
      
      .sidebar-nav a:hover {
        text-decoration: underline;
      }
      
      /* 主内容区域 - 填满剩余全部空间 */
      .main-content {
        flex: 1;
        min-width: 0;
        width: 100%;
      }
      
      /* 让文章内容区域的宽度也填满 */
      .main-content article,
      .main-content .post-content,
      .main-content section {
        width: 100%;
        max-width: 100%;
      }
      
      /* 覆盖 Minimal 主题对 section 的宽度限制 */
      section {
        width: 100% !important;
        max-width: 100% !important;
      }
      
      /* 响应式：手机端侧边栏堆叠 */
      @media (max-width: 768px) {
        .content-wrapper {
          flex-direction: column;
        }
        .sidebar-nav {
          width: 100%;
          position: static;
        }
        .wrapper {
          width: 98%;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      
      <div class="content-wrapper">
        <!-- 侧边导航栏 -->
        <nav class="sidebar-nav">
          <h3>📚 导航</h3>
          <ul>
            <li><a href="{{ "/" | relative_url }}">🏠 首页</a></li>
            <li><a href="/blog/android/splash">📱 Android 12 闪屏页适配</a></li>
            <!-- 👇 新增文章时，在这里加一行 -->
            <!-- <li><a href="你的文章路径.md">📄 文章标题</a></li> -->
          </ul>
          
          <h3>🔗 链接</h3>
          <ul>
            <li><a href="https://github.com/welcomeworld" target="_blank">GitHub</a></li>
          </ul>
        </nav>
        
        <!-- 主内容区域 - 填满剩余空间 -->
        <section class="main-content">
          {{ content }}
        </section>
      </div>
      
      <footer>
        {% if site.github.is_project_page %}
        <p>This project is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
        {% endif %}
        <p><small>Hosted on GitHub Pages &mdash; Theme by <a href="https://github.com/orderedlist">orderedlist</a></small></p>
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
