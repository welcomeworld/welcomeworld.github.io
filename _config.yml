# 基础配置
title: 你的博客标题
description: 一句话描述你的博客
author: 你的名字

# 启用 Minimal 主题
theme: jekyll-theme-minimal

# 自定义侧边栏所需的 Collections（按文件夹自动分类）
collections:
  tutorials:
    output: true
    permalink: /tutorials/:path/
  notes:
    output: true
    permalink: /notes/:path/

# 默认给每个页面添加 layout
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
